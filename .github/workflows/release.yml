name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write    # upload release assets
  id-token: write    # cosign keyless signing

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Install syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2
        with:
          # cosign v3 dropped the legacy --output-certificate /
          # --output-signature flags; .goreleaser.yaml writes the
          # Sigstore bundle (.sigstore.json) instead. README and
          # docs/index.html verify snippets must use --bundle to match.
          cosign-release: 'v3.0.6'

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: v2.15.4
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
